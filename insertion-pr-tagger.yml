schedules:
- cron: "0 */12 * * *"
  displayName: Roslyn Tagger Tool
  branches:
    include:
    - main
  always: true

variables:
- group: roslyn-perf-bot

# Make sure the pipeline doesn't build on commits.
trigger: none

resources:
  repositories:
  - repository: 1ESPipelineTemplates
    type: git
    name: 1ESPipelineTemplates/1ESPipelineTemplates
    ref: refs/tags/release

extends:
  template: v1/1ES.Unofficial.PipelineTemplate.yml@1ESPipelineTemplates
  parameters:
    pool:
      name: NetCore1ESPool-Svc-Internal
      image: 1es-ubuntu-2204
      os: linux
    sdl:
      sourceAnalysisPool:
        name: NetCore1ESPool-Svc-Internal
        image: 1es-windows-2022
        os: windows
    stages:
    - stage: tagInsertedPullRequest
      jobs:
      - job: runPRTagger
        steps:
          - task: UseDotNet@2
            displayName: 'Install .NET'
            inputs:
              version: 9.x
              includePreviewVersions: true
          - script: dotnet tool install Microsoft.RoslynTools --prerelease --add-source https://pkgs.dev.azure.com/dnceng/public/_packaging/dotnet-eng/nuget/v3/index.json -g
            displayName: Install Roslyn Insertion Tool
          - task: AzureCLI@2
            displayName: Run PR Tagger
            inputs:
              azureSubscription: 'Roslyn PRTagger: DevDiv'
              scriptType: pscore
              scriptLocation: inlineScript
              inlineScript: |
                $dncengAzdoToken = az account get-access-token --resource 499b84ac-1321-427f-aa17-267ca6975798 --query accessToken -o tsv
                if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($dncengAzdoToken)) {
                  Write-Error 'Failed to acquire dnceng Azure DevOps access token via WIF.'
                  exit 1
                }

                roslyn-tools pr-tagger --github-token $(roslyn-dotnet-bot-issue-w-pat) --devdiv-azdo-token $(roslyn-dn-bot-devdiv-build-r-release-r-code-r) --dnceng-azdo-token $dncengAzdoToken